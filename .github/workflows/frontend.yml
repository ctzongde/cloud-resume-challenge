name: Frontend CI/CD

on: # Trigger the workflow on push to the main branch
  push: 
    paths: # Only trigger the workflow when files in the infra or backend directories are changed
      - "app/**"

jobs: 
  deploy: 
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with: 
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-southeast-1

    - name: Upload frontend files to S3
      run: aws s3 sync app/ s3://chongteck-crc --delete

    - name: Invalidate CloudFront cache
      run: aws cloudfront create-invalidation --distribution-id EHR6MMGY6G9CG --paths "/*"